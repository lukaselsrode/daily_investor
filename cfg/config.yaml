ignore_negative_pe: true
ignore_negative_pb: false

dividend_threshold: 0.03
metric_threshold: 0.75
selloff_threshold: 30

weekly_investment: 400
index_pct: 0.70

auto_approve: true
use_sentiment_analysis: true
confidence_threshold: 65
sell_sentiment_override_confidence: 85
max_iterations: 10

etfs:
  - SPY
  - VOO
  - VTI
  - QQQ
  - SCHD
  - MPLY
  - SMH
  - VXUS
  - VNQ
  - IWM

score_weights:
  value: 0.08
  quality: 0.50
  income: 0.08
  momentum: 0.34

valuation_guardrails:
  max_pe_component: 5.0
  max_pb_component: 5.0
  min_pe_ratio: 1.0
  min_pb_ratio: 0.1

risk:
  max_single_position_pct: 0.05
  max_sector_pct: 0.25
  max_order_pct_of_cash: 0.10
  min_order_amount: 5.0
  min_liquidity_volume: 500000

  max_buys_per_rebalance: 7
  max_sentiment_candidates: 20

  minimum_hold_days: 5

  allow_whole_share_fallback: false
  max_whole_share_buys_per_run: 2
  max_whole_share_allocation_multiplier: 1.25

  min_index_pct: 0.60

sell_rules:
  stop_loss_pct: -0.20

  # tighter than original but not hyper-fragile
  trailing_stop_pct: -0.08

  # let winners run longer
  take_profit_pct: 0.60

  take_profit_value_floor_multiplier: 1.20

  # weak thesis exit threshold
  sell_weak_value_below: 0.45

  minimum_days_before_take_profit: 10

  sell_yield_trap: true
  sell_low_quality_below: -0.25

  min_days_held_before_value_exit: 21

bear_market:
  spy_ma_period: 200
  vix_threshold: 25.0

# Three-tier market regime — replaces binary bear_market flag
regime:
  spy_ma_period: 200
  vix_defensive_threshold: 30.0   # VIX above this → defensive
  vix_neutral_threshold: 20.0     # VIX between neutral and defensive thresholds → neutral

  defensive:
    index_pct_override: 0.85      # raise ETF allocation
    max_buys_override: 3          # limit active sleeve buys
    stop_loss_tighten: 0.05       # tighten stop_loss by this amount

  neutral:
    index_pct_override: null      # use base config
    max_buys_override: null

etf_risk:
  enabled: true
  use_ma_filter: true
  ma_period: 200                  # exit ETF position if price < N-day MA (defensive only)
  defensive_etf_pct: 0.85        # ETF allocation during defensive regime
  defensive_cash_pct: 0.10       # hold this fraction as cash when defensive

scoring:
  # keep PE slightly favored over PB
  value_pe_weight: 0.60
  value_pb_weight: 0.40

  income_score_cap: 1.5
  yield_trap_threshold: 0.10
  distress_pe_max: 5.0

  quality_volume_high: 1000000
  quality_volume_low: 100000

  quality_dividend_min: 0.02
  quality_dividend_max: 0.06

  quality_weight_has_positive_pe: 0.5
  quality_weight_distress_pe: -0.4
  quality_weight_has_positive_pb: 0.2
  quality_weight_high_volume: 0.3
  quality_weight_low_volume: -0.3
  quality_weight_yield_trap: -0.6
  quality_weight_healthy_dividend: 0.2

momentum:
  position_bin_boundaries:
    - 0.15
    - 0.35
    - 0.75
    - 0.95

  # penalize weak 52w positioning,
  # strongly reward upper quartile momentum
  position_bin_scores:
    - -0.35
    - -0.10
    - 0.55
    - 0.85
    - 0.45

  return_1m_low_position_cutoff: 0.40
  return_1m_recovery_threshold: 0.05
  return_1m_falling_knife_threshold: -0.10

  return_1m_recovery_bonus: 0.15
  return_1m_falling_knife_penalty: 0.20

# Multi-factor continuous momentum scoring (v2)
# Replaces bin-based system in live scoring and backtest engine.
# Backward-compat: momentum.position_bin_* retained for tests.
momentum_v2:
  # Sub-weights — normalized internally so values are relative, not absolute
  weights:
    rs_3m: 0.25            # relative strength vs SPY, 3-month
    rs_6m: 0.25            # relative strength vs SPY, 6-month
    risk_adj_3m: 0.20      # return_3m / realized_vol_3m (Sharpe-like)
    trend_structure: 0.15  # price vs 50/200 DMA
    return_1m: 0.10        # raw 1-month return
    return_5d: 0.05        # short-term momentum check

  penalties:
    falling_knife_3m_threshold: -0.15    # 3m return below this → penalty
    falling_knife_penalty: 0.25
    overextension_52w_threshold: 0.97    # position_52w above this → penalty
    overextension_penalty: 0.20
    high_vol_annual_threshold: 0.50      # annualized realized vol above this → penalty
    high_vol_penalty: 0.15

  clamp_low: -1.0
  clamp_high: 1.5
  winsorize_pct: 0.05  # clip top/bottom N% of cross-section before percentile ranking

analyst_ratings:
  strong_buy_ratio: 5.0
  net_sell_ratio: 1.0
  strong_buy_multiplier: 1.05
  net_sell_multiplier: 0.95

harvest:
  enabled: true

  # harvest after strong upside
  profit_harvest_pct: 0.40

  # most harvested gains reinforce ETF core
  harvest_to_etfs_pct: 0.80

  # small recycle bucket for continued active exposure
  recycle_to_stocks_pct: 0.20

  # allow exceptional winners to continue
  harvest_only_if_value_metric_below_multiplier: 1.20

  min_harvest_amount: 25.0

  # cap total harvest pressure
  max_harvest_pct_of_portfolio: 0.02

  harvest_etfs:
    - SPY
    - VTI

backtest:
  default_mode: liquid_universe_sanity_test

  universe_selection: liquid_sample

  max_symbols: 300
  min_volume: 500000
  random_seed: 42

  benchmark_symbol: SPY

  # realism settings
  slippage_bps: 10.0
  commission_per_trade: 0.0

  # capital simulation
  starting_capital: 5000.0
  weekly_contribution: 400.0
  rebalance_frequency_days: 5

  deploy_initial_cash: true
  reinvest_sell_proceeds: true

  # validation
  train_pct: 0.70
  use_out_of_sample_validation: true

  auto_apply_if_valid: false

  min_validation_excess_return: 0.0
  max_validation_drawdown: -0.20
  min_validation_sharpe: 0.25

  # IMPORTANT:
  # returns should be contribution-adjusted /
  # time-weighted, not naive final_value/start
  use_time_weighted_returns: true

  # optimizer realism
  turnover_penalty_enabled: true
  turnover_penalty_trade_count: 50
  turnover_penalty_weight: 0.35

  # optional LLM review layer
  llm_review_enabled: false
  llm_review_top_n: 5
  llm_review_apply: false
  llm_review_model: claude-sonnet-4-6

  # trade frequency / cooldown controls
  max_trades_per_week: 10
  cooldown_days_after_sell: 3
  cooldown_days_after_stopout: 7

  # volatility-scaled slippage:
  # effective_slippage_bps = slippage_bps * (1 + vol_slippage_multiplier * annualized_vol)
  vol_slippage_scaling: true
  vol_slippage_multiplier: 2.0

# ---------------------------------------------------------------------------
# Optimizer control — prevents overfitting
# frozen_parameters: parameters held at current config values during optimization
# parameter_bounds:  override default search bounds (min/max per parameter)
# ---------------------------------------------------------------------------
tuning:
  frozen_parameters:
    - score_weights.value
    - score_weights.income
    - metric_threshold
    - sell_rules.take_profit_pct
    - sell_rules.sell_weak_value_below
    - sell_rules.trailing_stop_pct
    - scoring.value_pe_weight
    - momentum_v2.weights.rs_3m
    - momentum_v2.weights.rs_6m
    - momentum_v2.weights.risk_adj_3m
    - momentum_v2.weights.trend_structure
    - momentum_v2.weights.return_1m
    - momentum_v2.weights.return_5d

  parameter_bounds:
    score_weights.value:
      min: 0.05
      max: 0.25
    score_weights.quality:
      min: 0.35
      max: 0.60
    score_weights.momentum:
      min: 0.20
      max: 0.40
    score_weights.income:
      min: 0.05
      max: 0.15
    metric_threshold:
      min: 0.60
      max: 1.10
    index_pct:
      min: 0.60
      max: 0.85
    sell_rules.trailing_stop_pct:
      min: -0.12
      max: -0.05

# ---------------------------------------------------------------------------
# Reliability scoring — DATA / SIGNAL QUALITY indicators, NOT alpha
# Measures trustworthiness of a stock's computed score.
# Set enabled: true to gate live buys on min_reliability_score.
# ---------------------------------------------------------------------------
reliability:
  enabled: false
  min_reliability_score: 0.70

# ---------------------------------------------------------------------------
# Parameter stability analysis — RESEARCH / DIAGNOSTIC ONLY
# Runs the optimizer across multiple windows and objectives to detect
# unstable or overfit parameters. Never auto-applies results.
# ---------------------------------------------------------------------------
stability:
  enabled: true
  windows:
    - 30
    - 60
    - 90
    - 180
    - 365
  objectives:
    - sharpe
    - calmar
  output_dir: reports/stability
  unstable_spread_threshold: 0.15   # |sharpe_opt - calmar_opt| above this → UNSTABLE
  unstable_cv_threshold: 0.30       # stddev/|mean| across windows above this → UNSTABLE
  max_unstable_params: 5            # warn if more than N params are unstable
  scan_maxiter: 15                  # optimizer iterations per window (faster than full tune)
  scan_popsize: 6                   # population size per window

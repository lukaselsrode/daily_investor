ignore_negative_pe: false
ignore_negative_pb: false
dividend_threshold: 0.03
metric_threshold: 0.75
selloff_threshold: 30
weekly_investment: 400
index_pct: 0.7
auto_approve: true
use_sentiment_analysis: true
confidence_threshold: 65
sell_sentiment_override_confidence: 85
max_iterations: 10
etfs:
- SPY
- VOO
- VTI
- QQQ
- SCHD
- SMH
- VXUS
- VNQ
- IWM
- DRAM
score_weights:
  value: 0.05
  quality: 0.45
  income: 0.1
  momentum: 0.4
valuation_guardrails:
  max_pe_component: 5.0
  max_pb_component: 5.45
  min_pe_ratio: 1.0
  min_pb_ratio: 0.1
risk:
  max_single_position_pct: 0.07
  max_sector_pct: 0.25
  max_order_pct_of_cash: 0.5
  min_order_amount: 5.0
  min_liquidity_volume: 500000
  max_buys_per_rebalance: 4
  max_sentiment_candidates: 20
  minimum_hold_days: 5
  allow_whole_share_fallback: true
  max_whole_share_buys_per_run: 2
  max_whole_share_allocation_multiplier: 1.25
  min_index_pct: 0.65
  min_candidate_allocation_pct: 0.1
sell_rules:
  stop_loss_pct: -0.2
  trailing_stop_pct: -0.08
  take_profit_pct: 0.6
  take_profit_value_floor_multiplier: 1.2
  sell_weak_value_below: 0.45
  minimum_days_before_take_profit: 10
  sell_yield_trap: true
  sell_low_quality_below: -0.25
  min_days_held_before_value_exit: 21
bear_market:
  spy_ma_period: 200
  vix_threshold: 25.0
regime:
  spy_ma_period: 200
  vix_defensive_threshold: 30.0
  vix_neutral_threshold: 20.0
  defensive:
    index_pct_override: 0.85
    max_buys_override: 3
    stop_loss_tighten: 0.05
  neutral:
    index_pct_override: 0.77
    max_buys_override: 4
etf_risk:
  enabled: true
  use_ma_filter: true
  ma_period: 200
  defensive_etf_pct: 0.85
  defensive_cash_pct: 0.1
scoring:
  value_pe_weight: 0.6
  value_pb_weight: 0.4
  income_score_cap: 1.5
  yield_trap_threshold: 0.1
  distress_pe_max: 5.0
  quality_volume_high: 1000000
  quality_volume_low: 100000
  quality_dividend_min: 0.02
  quality_dividend_max: 0.06
  quality_weight_has_positive_pe: 0.5
  quality_weight_distress_pe: -0.4
  quality_weight_has_positive_pb: 0.2
  quality_weight_high_volume: 0.3
  quality_weight_low_volume: -0.3
  quality_weight_yield_trap: -0.6
  quality_weight_healthy_dividend: 0.2
momentum:
  position_bin_boundaries:
  - 0.15
  - 0.35
  - 0.75
  - 0.95
  position_bin_scores:
  - -0.35
  - -0.1
  - 0.55
  - 0.85
  - 0.45
  return_1m_low_position_cutoff: 0.4
  return_1m_recovery_threshold: 0.05
  return_1m_falling_knife_threshold: -0.1
  return_1m_recovery_bonus: 0.15
  return_1m_falling_knife_penalty: 0.2
momentum_v2:
  weights:
    rs_3m: 0.25
    rs_6m: 0.25
    risk_adj_3m: 0.2
    trend_structure: 0.15
    return_1m: 0.1
    return_5d: 0.05
  penalties:
    falling_knife_3m_threshold: -0.15
    falling_knife_penalty: 0.25
    overextension_52w_threshold: 0.97
    overextension_penalty: 0.2
    high_vol_annual_threshold: 0.5
    high_vol_penalty: 0.15
  clamp_low: -1.0
  clamp_high: 1.5
  winsorize_pct: 0.05
analyst_ratings:
  strong_buy_ratio: 5.0
  net_sell_ratio: 1.0
  strong_buy_multiplier: 1.05
  net_sell_multiplier: 0.95
harvest:
  enabled: true
  profit_harvest_pct: 0.4
  harvest_to_etfs_pct: 0.85
  recycle_to_stocks_pct: 0.2
  harvest_only_if_value_metric_below_multiplier: 1.2
  min_harvest_amount: 25.0
  max_harvest_pct_of_portfolio: 0.02
  harvest_etfs:
  - SPY
  - VTI
backtest:
  default_mode: liquid_universe_sanity_test
  universe_selection: liquid_sample
  max_symbols: 300
  min_volume: 500000
  random_seed: 42
  benchmark_symbol: SPY
  slippage_bps: 10.0
  commission_per_trade: 0.0
  starting_capital: 5000.0
  weekly_contribution: 400.0
  rebalance_frequency_days: 5
  deploy_initial_cash: true
  reinvest_sell_proceeds: true
  train_pct: 0.7
  use_out_of_sample_validation: true
  auto_apply_if_valid: false
  min_validation_excess_return: 0.0
  max_validation_drawdown: -0.2
  min_validation_sharpe: 0.25
  use_time_weighted_returns: true
  turnover_penalty_enabled: true
  turnover_penalty_trade_count: 60
  turnover_penalty_weight: 0.15
  llm_review_enabled: false
  llm_review_top_n: 5
  llm_review_apply: false
  llm_review_model: claude-sonnet-4-6
  max_trades_per_week: 10
  cooldown_days_after_sell: 3
  cooldown_days_after_stopout: 7
  vol_slippage_scaling: true
  vol_slippage_multiplier: 2.0
tuning:
  frozen_parameters:
  - score_weights.value
  - score_weights.income
  - metric_threshold
  - sell_rules.take_profit_pct
  - sell_rules.sell_weak_value_below
  - sell_rules.trailing_stop_pct
  - scoring.value_pe_weight
  - momentum_v2.weights.rs_3m
  - momentum_v2.weights.rs_6m
  - momentum_v2.weights.risk_adj_3m
  - momentum_v2.weights.trend_structure
  - momentum_v2.weights.return_1m
  - momentum_v2.weights.return_5d
  parameter_bounds:
    score_weights.value:
      min: 0.03
      max: 0.12
    score_weights.quality:
      min: 0.35
      max: 0.55
    score_weights.momentum:
      min: 0.3
      max: 0.55
    score_weights.income:
      min: 0.03
      max: 0.1
    index_pct:
      min: 0.65
      max: 0.85
reliability:
  enabled: false
  min_reliability_score: 0.7
stability:
  enabled: true
  windows:
  - 30
  - 60
  - 90
  - 180
  - 365
  objectives:
  - sharpe
  - calmar
  output_dir: reports/stability
  unstable_spread_threshold: 0.15
  unstable_cv_threshold: 0.3
  max_unstable_params: 5
  scan_maxiter: 15
  scan_popsize: 6
candidate_rotation:
  buy_cooldown_days: 30
  score_jitter_pct: 0.08
value_v2:
  enabled: true
  winsorize_pct: 0.05
  sector_relative: true
  min_sector_size: 5
  clamp_low: -1.0
  clamp_high: 1.5
  distress:
    pe_threshold: 5.0
    pe_penalty: 0.3
    negative_eps_penalty: 0.25
  composite:
    pe_weight: 0.6
    pb_weight: 0.4
snapshots:
  enabled: true
  subdir: snapshots
  retention_days: 365
  compression: snappy
dividends:
  enabled: true
  track_income: true
  wash_sale_warning: true
  block_rebuy_on_wash_sale_risk: false
research:
  min_snapshots_for_weight_recommendations: 20
  min_snapshots_for_high_confidence: 60
earnings:
  enabled: true
  max_quality_bonus: 0.1
  positive_surprise_bonus: 0.03
  negative_surprise_penalty: 0.05
portfolio_intelligence:
  enabled: true
  watch_score_drop_pct: 0.25
  watch_rank_drop_pct: 0.3
  exit_score_below: 0.45
  exit_rank_below_pct: 0.4
  min_holding_days_before_watch: 5
  show_etf_rationale: true
  show_active_rationale: true
  premature_exit_min_thesis_score: 0.65
  premature_exit_min_quality: 0.3
  premature_exit_min_momentum: 0.0
  confidence_collapse_reliability_threshold: 0.6
exit_decision:
  enabled: true
  score_below_threshold_requires_confirmation: true
  positive_pnl_exit_downgrade: true
  positive_momentum_exit_downgrade: true
  strong_quality_exit_downgrade: true
  hard_exit_score_below: 0.2
  review_score_below: 0.45
  positive_pnl_review_floor: 0.0
  positive_momentum_review_floor: 0.1
  strong_quality_review_floor: 0.7
  trim_profit_threshold: 0.15
  harvest_profit_threshold: 0.25
  thesis_intact_review_floor: 0.6
  thesis_intact_hard_exit_below: 0.35
decision_adjustment:
  premature_exit_threshold: 0.45
  review_confidence_threshold: 0.5
  escalate_watch_to_review: false
outcome_tracking:
  enabled: true
  fill_returns_on_run: true
candidate_selection:
  mode: percentile
  top_percentile: 0.15
  max_candidates: 25
  min_candidates: 5
  use_absolute_score_floor: false
  absolute_score_floor: 0.45
  min_quality_score: 0.3
  min_momentum_score: -0.1
  min_conditional_momentum_score: -0.05
  allow_income_defensive_exception: true
ui:
  allow_config_writes: true

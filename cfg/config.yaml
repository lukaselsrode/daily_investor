ignore_negative_pe: true
ignore_negative_pb: false

dividend_threshold: 0.03
metric_threshold: 0.75
selloff_threshold: 30

weekly_investment: 400
index_pct: 0.65

auto_approve: true
use_sentiment_analysis: true
confidence_threshold: 65
max_iterations: 10

etfs:
  - SPY
  - VOO
  - VTI
  - QQQ
  - SCHD
  - MPLY
  - SMH
  - VXUS
  - VNQ
  - IWM

score_weights:
  value: 0.10
  quality: 0.45
  income: 0.10
  momentum: 0.35

valuation_guardrails:
  max_pe_component: 5.0
  max_pb_component: 5.0
  min_pe_ratio: 1.0
  min_pb_ratio: 0.1

risk:
  max_single_position_pct: 0.05
  max_sector_pct: 0.25
  max_order_pct_of_cash: 0.10
  min_order_amount: 5.0
  min_liquidity_volume: 500000

  max_buys_per_rebalance: 10
  max_sentiment_candidates: 20

  allow_whole_share_fallback: false
  max_whole_share_buys_per_run: 2
  max_whole_share_allocation_multiplier: 1.25

  min_index_pct: 0.60

sell_rules:
  stop_loss_pct: -0.20

  # tighter than original but not hyper-fragile
  trailing_stop_pct: -0.08

  # let winners run longer
  take_profit_pct: 0.60

  take_profit_value_floor_multiplier: 1.20

  # weak thesis exit threshold
  sell_weak_value_below: 0.45

  sell_yield_trap: true
  sell_low_quality_below: -0.25

  min_days_held_before_value_exit: 21

bear_market:
  spy_ma_period: 200
  vix_threshold: 25.0

scoring:
  # keep PE slightly favored over PB
  value_pe_weight: 0.60
  value_pb_weight: 0.40

  income_score_cap: 1.5
  yield_trap_threshold: 0.10
  distress_pe_max: 5.0

  quality_volume_high: 1000000
  quality_volume_low: 100000

  quality_dividend_min: 0.02
  quality_dividend_max: 0.06

  quality_weight_has_positive_pe: 0.5
  quality_weight_distress_pe: -0.4
  quality_weight_has_positive_pb: 0.2
  quality_weight_high_volume: 0.3
  quality_weight_low_volume: -0.3
  quality_weight_yield_trap: -0.6
  quality_weight_healthy_dividend: 0.2

momentum:
  position_bin_boundaries:
    - 0.15
    - 0.35
    - 0.75
    - 0.95

  # penalize weak 52w positioning,
  # strongly reward upper quartile momentum
  position_bin_scores:
    - -0.35
    - -0.10
    - 0.55
    - 0.85
    - 0.45

  return_1m_low_position_cutoff: 0.40
  return_1m_recovery_threshold: 0.05
  return_1m_falling_knife_threshold: -0.10

  return_1m_recovery_bonus: 0.15
  return_1m_falling_knife_penalty: 0.20

analyst_ratings:
  strong_buy_ratio: 5.0
  net_sell_ratio: 1.0
  strong_buy_multiplier: 1.05
  net_sell_multiplier: 0.95

harvest:
  enabled: true

  # harvest after strong upside
  profit_harvest_pct: 0.40

  # most harvested gains reinforce ETF core
  harvest_to_etfs_pct: 0.80

  # small recycle bucket for continued active exposure
  recycle_to_stocks_pct: 0.20

  # allow exceptional winners to continue
  harvest_only_if_value_metric_below_multiplier: 1.20

  min_harvest_amount: 25.0

  # cap total harvest pressure
  max_harvest_pct_of_portfolio: 0.02

  harvest_etfs:
    - SPY
    - VTI

backtest:
  default_mode: liquid_universe_sanity_test

  universe_selection: liquid_sample

  max_symbols: 300
  min_volume: 500000
  random_seed: 42

  benchmark_symbol: SPY

  # realism settings
  slippage_bps: 10.0
  commission_per_trade: 0.0

  # capital simulation
  starting_capital: 5000.0
  weekly_contribution: 400.0
  rebalance_frequency_days: 5

  deploy_initial_cash: true
  reinvest_sell_proceeds: true

  # validation
  train_pct: 0.70
  use_out_of_sample_validation: true

  auto_apply_if_valid: false

  min_validation_excess_return: 0.0
  max_validation_drawdown: -0.20
  min_validation_sharpe: 0.25

  # IMPORTANT:
  # returns should be contribution-adjusted /
  # time-weighted, not naive final_value/start
  use_time_weighted_returns: true

  # optimizer realism
  turnover_penalty_enabled: true
  turnover_penalty_trade_count: 100
  turnover_penalty_weight: 0.15

  # optional LLM review layer
  llm_review_enabled: false
  llm_review_top_n: 5
  llm_review_apply: false
  llm_review_model: claude-sonnet-4-6

ignore_negative_pe: false
ignore_negative_pb: false
dividend_threshold: 0.03
# DUAL-ROLE KNOB (2026-06): as a live entry gate 1.15 is unreachable under
# peer-percentile scoring (value_metric max ~0.86) — live entry is decoupled via
# candidate_selection.entry_threshold_override (0.75) instead. As the EXIT-ladder
# anchor (trim ≈ metric*0.85, take-profit floor = metric*1.2) a clean-data A/B
# showed 1.15 vs 0.75 is near-neutral in backtest (train +3.54% vs +3.63% excess,
# validation identical); 1.15 kept as the validated value. NOTE: a backtest that
# first blamed 0.75 for a -10% validation swing was contaminated by a stripped
# agg_data snapshot (see data/market.py persist-on-refresh-only fix), not by this.
metric_threshold: 1.15
selloff_threshold: 30
weekly_investment: 400
index_pct: 0.8465
# Buy-the-dip contribution-sizing overlay (2026-06). Sizes each week's NEW cash
# from short-term benchmark conditions while a rolling window keeps the monthly
# total near target. Contribution sizing ONLY — never sells or alters holdings.
# enabled:false preserves the flat weekly_investment behavior exactly.
#
# DECISION 2026-06-10: REJECTED — keep disabled. Fixed-budget version
# underperforms flat DCA (bull-tape cash drag); dip-only acceleration beats
# flat $400/wk but the benefit is explained almost entirely by higher total
# contributions — equal-capital flat DCA captures the same with less
# complexity (see scripts/contribution_timing_compare.py, reports/
# contribution_*_compare.json). RE-TEST only when a real bear-market window
# enters the survivorship-free dataset (--mode dip_only, A' control).
contribution_timing:
  enabled: false
  benchmark_symbol: SPY
  base_weekly_contribution: 400
  target_monthly_contribution: 1600
  budget_window_weeks: 4
  min_weekly_contribution: 100
  max_weekly_contribution: 800
  preserve_monthly_budget: true
  allow_budget_acceleration: false
  monthly_budget_tolerance_pct: 0.15
  carry_forward_unused_budget: true
  borrow_from_future_weeks: true
  dip_signal:
    lookback_1w_days: 5
    lookback_1m_days: 21
    high_lookback_short: 20
    high_lookback_medium: 60
    ma_short: 50
    ma_long: 200
    # Weights are renormalized over the computable components at decision time
    # (and after tuning), so they always effectively sum to 1.0.
    weights:
      return_1w: 0.25
      return_1m: 0.25
      drawdown_20d: 0.20
      drawdown_60d: 0.15
      ma50_gap: 0.10
      ma200_gap: 0.05
  multiplier:
    neutral_dip_score: 0.35
    dip_sensitivity: 1.25
    min_multiplier: 0.50
    max_multiplier: 2.00
    smoothing_alpha: 0.50
  regime_controls:
    cap_multiplier_in_defensive: true
    defensive_max_multiplier: 1.25
    allow_full_dip_buying_in_bull: true
rebalance:
  mode: contribution_driven
  drift_tolerance_pct: 0.03
  proportional_deficit_routing: true
auto_approve: true
use_sentiment_analysis: true
confidence_threshold: 65
sell_sentiment_override_confidence: 85
max_iterations: 10
etfs:
- SPY
- VOO
- VTI
- QQQ
- SCHD
- SMH
- VXUS
- VNQ
- IWM
- DRAM
# 2026-06: quality-momentum blend from regime-robust DE tune (maximize worst-of[bear,bull]
# info ratio on the 1250d split). Lifted worst-regime IR +0.177 -> +0.321 (bear +0.18->+0.39,
# bull held). MUST be paired with the wider breadth below (max_buys 8 / top_percentile 0.19 /
# max_candidates 12) — attribution shows neither works alone (breadth-only and quality-only
# both go negative); only the quality+breadth COMBINATION is regime-robust (quality screens the
# junk that breadth adds). CAVEAT: quality_scores are a static current snapshot, so the quality
# benefit is partly look-ahead-inflated (quality persists ~0.7 yr/yr, so partial not total);
# +0.321 is an optimistic ceiling. PROVISIONAL pending point-in-time quality + survivorship-free data.
score_weights:
  value: 0.064
  quality: 0.323
  income: 0.051
  momentum: 0.562
valuation_guardrails:
  max_pe_component: 5.0
  max_pb_component: 5.45
  min_pe_ratio: 1.0
  min_pb_ratio: 0.1
# Discretionary overlay — the human judgment the backward-looking quant factors can't encode.
discretionary:
  # Hard NEVER-BUY. The factors (quality/value/momentum) are backward-looking, so a structurally
  # declining industry can still screen well (stable margins, cheap, recent price bounce) even when
  # it has no terminal upside. List industries/sectors to exclude from all buying. (Investment
  # trusts / mutual funds are always excluded regardless, via the industry list in util.py.)
  excluded_industries:
    - Broadcasting              # satellite radio / SIRI — secular decline, no terminal upside
    - "Cable/Satellite TV"      # cord-cutting; same disruption thesis as SIRI
    - "Publishing: Newspapers"  # canonical internet-disrupted value trap
    # NOTE: "Department Stores" removed — the label catches e-commerce momentum names
    # (e.g. PDD/Pinduoduo) the picker was profitably trading; the blunt exclusion cost more
    # than it saved. The "Miscellaneous" sector exclusion was also dropped (its names are
    # funds already covered by the Investment Trusts industry exclusion).
    - "Commercial Printing/Forms"  # paper/print secular decline
    - "Office Equipment/Supplies"  # paper-era office hardware (Xerox-type)
    # NOTE: "Textiles" removed — the label catches misclassified industrials like AIN
    # (Albany International, aerospace composites, strong momentum), not just apparel textile.
  excluded_sectors: []
  # Hard NEVER-AUTO-SELL. Conviction/thesis positions whose forward catalyst the momentum-based sell
  # rules can't see (a turnaround, an AI inflection, etc.). The sell engine skips these entirely.
  conviction_holds:
    - BABA                  # Qwen inflection + deep-value turnaround — a thesis the algo can't quantify
    - BABU                  # 2x-leveraged BABA — high-conviction expression of the same thesis
                            # (note: leveraged ETFs decay in choppy/sideways tapes — sized for conviction)
risk:
  max_single_position_pct: 0.09
  max_sector_pct: 0.25
  max_order_pct_of_cash: 0.5
  min_order_amount: 30.0
  min_liquidity_volume: 500000
  # 2026-06: 3 -> 8 (breadth). Pairs with the quality-momentum score_weights + candidate_selection
  # widening below; the combination lifts worst-regime info ratio (see score_weights note).
  max_buys_per_rebalance: 8
  max_sentiment_candidates: 20
  minimum_hold_days: 10
  allow_whole_share_fallback: true
  max_whole_share_buys_per_run: 2
  max_whole_share_allocation_multiplier: 1.25
  min_index_pct: 0.65
  # 2026-06: 0.12 -> 0.25 (position-dust fix). At ~$300-400/run the 12% slice produced
  # $37 orders into a 59-position book (~$170/position average) — noise-sized picks
  # that can't carry the signal. 25% means at most ~4 concurrent buys at $80-150 each.
  min_candidate_allocation_pct: 0.25
sell_rules:
  # stop_loss_pct widened to -30% (2026-05): with trim OFF + harvest +50%,
  # positions need more room. Full-universe holdout sweep showed -30% beats
  # -20%: pct-beat 50%->56%, excess +2.3%->+3.1%, Sharpe 1.28->1.42,
  # drawdown even improves (-25.6%->-24.9%) — wider stop reduces false exits
  # on names that would have recovered and compounded.
  stop_loss_pct: -0.3
  trailing_stop_pct: -0.39
  # take_profit_pct raised to 1.50 (2026-05): with harvest now at +50%,
  # full-exit threshold raised to +150% to avoid collision and let true
  # compounders run well past harvest. Section 2 sweep showed +150% ≡ +300%
  # ≡ OFF (Sharpe 1.24, holdout +1.1%) — all equivalent once harvest fires first.
  take_profit_pct: 1.5
  take_profit_value_floor_multiplier: 1.2
  # 2026-06: 0.37 -> -0.18 (regime-robust exit-ladder DE tune). Was dumping merely-okay names
  # (score 0..0.37) on weakness; now only sells the genuinely-bad (< -0.18), holding the rest.
  # Lifted worst-regime info ratio +0.321 -> +0.383 (BOTH regimes up). Structural change — no
  # look-ahead / survivorship dependency — confirms the 'stop selling winners' finding. stop_loss
  # still cuts price-crashers; this only relaxes the SCORE-based exit. Other ladder knobs
  # (take_profit/trailing/stop_loss) optimized to ~unchanged (noise) and left as-is.
  sell_weak_value_below: -0.18
  minimum_days_before_take_profit: 10
  sell_yield_trap: true
  sell_low_quality_below: -0.25
  min_days_held_before_value_exit: 21
archetype_management:
  enabled: true
  quality_compounder:
    trim_profit_threshold: 0.3
    harvest_profit_threshold: 0.7
    trailing_stop_pct: -0.22
    minimum_hold_days: 60
    thesis_exit_requires_confirmation: true
    allow_deeper_drawdown: true
  legacy_turnaround:

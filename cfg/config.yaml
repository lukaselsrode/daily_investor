    harvest_profit_threshold: 0.7
    trailing_stop_pct: -0.22
    minimum_hold_days: 60
    thesis_exit_requires_confirmation: false
    allow_deeper_drawdown: false
  value_recovery:
    trim_profit_threshold: 0.12
    harvest_profit_threshold: 0.25
    trailing_stop_pct: -0.07
    minimum_hold_days: 7
    thesis_exit_requires_confirmation: false
    allow_deeper_drawdown: false
  defensive_income:
    trim_profit_threshold: 0.08
    harvest_profit_threshold: 0.18
    trailing_stop_pct: -0.06
    minimum_hold_days: 5
    thesis_exit_requires_confirmation: false
    allow_deeper_drawdown: false
  core_default:
    trim_profit_threshold: 0.15
    harvest_profit_threshold: 0.28
    trailing_stop_pct: -0.07
    minimum_hold_days: 7
    thesis_exit_requires_confirmation: false
    allow_deeper_drawdown: false
contrarian_penalty:
  enabled: true
  score_multiplier: 0.92
  max_position_multiplier: 0.6
concentration_limits:
  enabled: true
  warn_only: false                         # ENFORCING — block/downsize cluster-cap violations
  max_cluster_weight: 0.60
  max_sector_weight: 0.4
  cluster_method: pca
  n_clusters: 6
  apply_to:
    active_sleeve: true
    etf_sleeve: false
  enforcement:
    block_new_buys: true
    allow_existing_positions: true
    allow_trim_only: true
    allow_sell: true
    allow_if_underweight: true
    downsize_to_fit: true
    min_remaining_alloc_multiple: 1.0
archetype_classifier:
  enabled: true                            # ON — diagnostics + (gate when require_yield=true)
  confidence_buckets:
    high_min: 0.65
    medium_min: 0.45
  defensive_income:
    require_yield: true                    # ON — strict gate disqualifies low-quality DI
    min_income_score: 0.30
    min_quality_score: 0.40
    min_momentum_score: -0.10
    max_volatility_percentile: 0.75
    reject_falling_knife: true
regime:
  spy_ma_period: 200
  vix_defensive_threshold: 30.0
  vix_neutral_threshold: 20.0
  bullish:
    # Momentum-alpha tilt: in confirmed-bull regime shift this fraction of score
    # weight from value/quality/income into momentum (alpha engine — chase winners).
    # 2026-06: regime/factor-internals tune found NOTHING robust here — left at 0.36. The DE's
    # +0.844 worst-IR (all blends on) was overfit to the 50/50 split (collapsed to +0.01 mean on
    # 7 independent rolling windows). The off-by-default blends (mean_rev/low_vol/residual_mom) are
    # noise-to-negative alone. Bumping tilt to 0.465 IMPROVED rolling windows but REGRESSED the
    # 50/50 split (+0.373->+0.173) — opposite verdicts = window-dependent noise, not an edge. Reverted.
    momentum_tilt: 0.36
  defensive:
    index_pct_override: 0.85
    max_buys_override: 3
    stop_loss_tighten: 0.05
    # Backtest regime de-risk overlay (frozen off = 0.0; behavior-preserving).
    # The LIVE path already de-risks on defensive regime via index_pct_override
    # (new capital routes to the index sleeve). The backtest historically ignored
    # this, overstating active-sleeve risk in downturns. When > 0, on the
    # transition INTO a defensive regime (SPY > 5% below its 200DMA) this fraction
    # of the held stock book is rotated into the benchmark instrument and held
    # there until the regime clears, then unwound back to cash. Validated PoC:
    # de-risk-to-INDEX (not cash) on defensive-only days is robust across the 730d
    # OOS and 1400d in-sample substrates (shrinks drawdowns, never hurts bull
    # 1.0 = fully track the benchmark while defensive. lag=1 is the realistic
    # execution default (observe regime at close d, act at d+1); lag=0 is same-bar
    # and mildly optimistic. See .session_tmp/overlay_lag_sweep.py for sensitivity.
    backtest_derisk_frac: 1.0
    backtest_derisk_switch_bps: 20.0
    backtest_derisk_lag: 1
    # Contrarian mean-reversion blend in fear regimes (0.0 = off; validated lever,
    # left off in the recommended config — see research notes).
    mean_reversion_blend: 0.0
    # Falling-knife / value-trap guard (0.0 = off, behavior-preserving default).
    # Research finding: among below-200DMA names, the HIGHEST-composite ones
    # systematically underperform the lowest-composite ones (monotonic pooled
    # quintiles, market-excess, t up to -7 at the 8-day horizon). When > 0, the
    # composite of below-200DMA names in the top `falling_knife_top_frac` of their
    # below-200DMA peer group is multiplied by (1 - falling_knife_guard). This is
    # downside protection for drawdowns, not an alpha source — it rarely changes the
    # buy basket because top-composite names are usually already above their 200DMA.
    falling_knife_guard: 0.0
    falling_knife_top_frac: 0.5
  neutral:
    index_pct_override: 0.77
    max_buys_override: 4
etf_risk:
  enabled: true
  use_ma_filter: true
  ma_period: 200
  defensive_etf_pct: 0.85
  defensive_cash_pct: 0.1
scoring:
  enabled: true
  # ── Price-derived factor blend overlays (frozen-by-default = 0.0) ──────────
  # Both blend a causal, backtestable price-only score into a factor sub-score.
  # 0.0 = pure configured factor (behavior-preserving). They are documented, tunable
  # knobs (param slots 48/49). Both have genuine SIGNAL-level edge (forward-IC +
  # quintile + random-basket placebo on the pinned 1550d substrate) BUT both FAILED
  # the system-level stability framework: run through random_window_backtest on the
  # best_alpha base across multiple seeds, neither improves active-sleeve excess —
  # low-vol monotonically hurts (-0.3% to -1.4%), residual-momentum is flat-to-negative
  # on a 4-seed mean (a +3.6% single-seed spike at 0.2 did not replicate; per-seed
  # window variance ±0.10 dwarfs the effect). Textbook IC≠P&L: real signal, not
  # additive to THIS tuned concentrated sleeve. LEFT OFF. Do not enable without a
  # multi-seed robust backtest that clears the bar.
  #
  # quality_low_vol_blend (slot 48): low-volatility rank into the QUALITY factor.
  quality_low_vol_blend: 0.0
  # momentum_residual_blend (slot 49): residual momentum (Blitz-Huij-Martens, beta-
  #   stripped) into the MOMENTUM factor. Strongest single-factor fwd-IC on the
  #   substrate but fails the robust multi-seed backtest (above).
  momentum_residual_blend: 0.0
  peer_standardization:
    group_by: industry
    fallback_group_by: sector
    min_group_size: 25
    method: percentile
    winsorize_pct: 0.01
    clamp_low: -1.0
    clamp_high: 1.5
    blend:
      industry_relative: 0.3
      sector_relative: 0.2
      market_relative: 0.5
  factors:
    value:
      enabled: true
      peer_relative: true
      pe_weight: 0.7
      pb_weight: 0.3
      distress:
        pe_threshold: 5.0
        pe_penalty: 0.3
        negative_eps_penalty: 0.25
      anchor_blend: 0.5
    quality:
      enabled: true
      peer_relative: true
      use_legacy_checklist_fallback: true
      anchor_blend: 0.7
    momentum:
      enabled: false
    income:
      enabled: true
      peer_relative: true
      safety_aware: true
      anchor_blend: 0.0
    growth_leadership:
      enabled: false
      peer_relative: true
  momentum_inputs:
    # 2026-06: leaned toward longer-horizon momentum (rs_6m + risk_adj_3m up, short-horizon
    # return_1m/return_5d cut). Regime-split test (1250d, train=2022 bear / val=24-26 bull):
    # this lifts the BEAR-window info ratio (+0.11 -> ~+0.35) while giving up bull-window IR.
    # Rationale is survivorship-aware: the universe has a 34.8% delisting hole, so the bull
    # numbers are inflated (they reward high-flyers that survived) while the bear regime —
    # where blowups actually happen — is the more honest test. Longer-horizon momentum avoids
    # the recent-rocket cohort the data hides. PROVISIONAL until survivorship-free data exists.
    weights:
      rs_3m: 0.20
      rs_6m: 0.55
      risk_adj_3m: 0.22
      trend_structure: 0.01
      return_1m: 0.0
      return_5d: 0.02
    penalties:
      falling_knife_3m_threshold: -0.15
      falling_knife_penalty: 0.25
      overextension_52w_threshold: 0.97
      overextension_penalty: 0.2
      high_vol_annual_threshold: 0.5
      high_vol_penalty: 0.15
    clamp_low: -1.0
    clamp_high: 1.5
    winsorize_pct: 0.05
  momentum_warmup:
    position_bin_boundaries:
    - 0.15
    - 0.35
    - 0.75
    - 0.95
    position_bin_scores:
    - -0.35
    - -0.1
    - 0.55
    - 0.85
    - 0.45
    return_1m_low_position_cutoff: 0.4
    return_1m_recovery_threshold: 0.05
    return_1m_falling_knife_threshold: -0.1
    return_1m_recovery_bonus: 0.15
    return_1m_falling_knife_penalty: 0.2
  quality_checklist:
    income_score_cap: 1.5
    yield_trap_threshold: 0.1
    distress_pe_max: 5.0
    quality_volume_high: 1000000
    quality_volume_low: 100000
    quality_dividend_min: 0.02
    quality_dividend_max: 0.06
    quality_weight_has_positive_pe: 0.5
    quality_weight_distress_pe: -0.4
    quality_weight_has_positive_pb: 0.2
    quality_weight_high_volume: 0.3
    quality_weight_low_volume: -0.3
    quality_weight_yield_trap: -0.6
    quality_weight_healthy_dividend: 0.2
analyst_ratings:
  strong_buy_ratio: 5.0
  net_sell_ratio: 1.0
  strong_buy_multiplier: 1.05
  net_sell_multiplier: 0.95
harvest:
  enabled: true
  profit_harvest_pct: 0.4
  harvest_to_etfs_pct: 0.85
  recycle_to_stocks_pct: 0.2
  harvest_only_if_value_metric_below_multiplier: 1.2
  min_harvest_amount: 25.0
  max_harvest_pct_of_portfolio: 0.02
  harvest_etfs:
  - SPY
  - VTI
backtest:
  default_mode: liquid_universe_full
  universe_selection: liquid_all
  # Survivorship-free backtesting (2026-06): when true, ALL backtest paths (UI / tuner / CLI /
  # engine) load split-adjusted prices for the current universe PLUS the ~1,890 delisted names
  # from the FMP cache (data/fmp_cache_adj/), removing the ~35% survivorship inflation. The honest
  # but ~2021-2026-bounded view. Default false (opt-in): toggle here or via the UI checkbox. Falls
  # back to yfinance with a warning if the cache is absent. See backtesting/survivorship.py.
  survivorship_free: true
  # Apply the discretionary NEVER-BUY industry/sector exclusions (discretionary.excluded_*,
  # funds/trusts, and the "Miscellaneous" sector) to the backtest candidate universe, mirroring
  # the live gate in data/fundamentals.py. Default true = live/backtest parity. Set false for
  # full-universe research (e.g. measuring what the exclusions actually cost). NOTE: the live
  # universe labels come from Robinhood and the backtest's from the FMP cache — mostly the same
  # taxonomy, but "Miscellaneous" is populated very differently (~550 live vs ~7 in the cache).
  apply_discretionary_exclusions: true
  # 0 = FULL universe (all liquid symbols, ~3300+). The algo's edge is breadth of
  # selection, so backtests/tuning/UI must span the whole universe, never a subset.
  # A positive value caps the universe for quick smoke-tests ONLY — never for an
  # accept/reject decision (use the full universe × multiple windows for that).
  max_symbols: 0
  min_volume: 500000
  random_seed: 42
  benchmark_symbol: SPY
  slippage_bps: 10.0
  commission_per_trade: 0.0
  starting_capital: 5000.0
  weekly_contribution: 400.0
  rebalance_frequency_days: 5
  deploy_initial_cash: true
  reinvest_sell_proceeds: true
  train_pct: 0.7
  use_out_of_sample_validation: true
  auto_apply_if_valid: false
  min_validation_excess_return: 0.0
  max_validation_drawdown: -0.2
  min_validation_sharpe: 0.25
  # 2026-06 incumbent-relative gates: a tuned config once passed the absolute gates
  # above with +0.34% validation excess while the incumbent config sat at +8.87%
  # with 5x less turnover (classic overfit). A candidate must now BEAT the config
  # we're already running on the same held-out split, not merely clear floors.
  min_excess_vs_incumbent: 0.0
  max_turnover_multiple: 2.0
  # Reproducibility gate: tuned vs incumbent on the SAME random sub-windows (shared
  # seed) of longer history than the tune saw. Requires paired win-rate >= min_win_rate,
  # plus higher median excess-vs-SPY and robust_score than the incumbent.
  random_window_gate:
    enabled: true
    history_days: 730
    n_windows: 12
    window_days: 120
    seed: 42
    min_win_rate: 0.5
  use_time_weighted_returns: true
  turnover_penalty_enabled: true
  turnover_penalty_trade_count: 60
  turnover_penalty_weight: 0.15
  # 2026-06 DE churn calibration: the trade-count penalty above is too weak to
  # stop the optimizer proposing 5.5x-incumbent turnover (every such candidate
  # is then rejected by the max_turnover_multiple gate — wasted evaluations).
  # Incumbent-relative ramp: free below soft x incumbent, linear to `weight` at
  # hard x, steep beyond. Anchor = one incumbent sim per optimization run.
  de_turnover_penalty_enabled: true
  de_turnover_penalty_vs_incumbent: true
  de_turnover_soft_limit_multiple: 1.5
  de_turnover_hard_limit_multiple: 2.5
  de_turnover_penalty_weight: 1.0
  # Final multi-horizon confirmation (runs ONLY after the split + incumbent +
  # random-window gates all pass): selected vs incumbent across trailing
  # windows. Windows are REGIME SAMPLES, treated symmetrically (2026-06-11
  # decision): the old short/mid recency ladder (0.5% improve-or-preserve on
  # 180d) was ~0.1 sigma of tracking error — a coin-flip — and structurally
  # entrenched whatever regime the incumbent was last tuned in (it vetoed two
  # consecutive candidates that won every other window, the rw gate, drawdown
  # and churn). Sub-400d windows now share one catastrophe-scale tolerance
  # (~0.7 sigma at 180d); 730d keeps the long catastrophe checks (0.10 is the
  # same z-score at 730d via sqrt-t scaling). Turnover stays within
  # max_turnover_multiple on every window. Fail -> config NOT written.
  multi_horizon_confirm:
    enabled: true
    windows: [90, 180, 365, 730]
    regress_tolerance: 0.04
    long_catastrophe_excess: 0.10
    long_catastrophe_drawdown: 0.05
  # Stress gauntlet (final gate after multi-horizon): falsification, not
  # win-requirements. At our sample size (~5-20y) excess point estimates cannot
  # rank strategies; what a small sample CAN do is refute fragility. The
  # candidate must SURVIVE each named stress regime relative to the incumbent
  # (catastrophe floors on excess/drawdown/turnover), not win it.
  # SURVIVORSHIP CAVEAT: dead-name coverage starts 2021 (the current FMP plan
  # serves only page 0 of /delisted-companies), so pre-2021 episodes run on a
  # survivor-biased cross-section. Checks are incumbent-RELATIVE (both configs
  # share the bias) and every report row carries its dead-name count. An FMP
  # plan with full delisted pagination would unlock honest deep-history
  # falsification — until then, treat pre-2021 episode results as relative
  # evidence only.
  stress_gauntlet:
    enabled: true
    history_days: 5000           # full cache reach (benchmark axis starts 2006-07)
    catastrophe_excess: 0.10
    catastrophe_drawdown: 0.05
    min_symbols: 300             # episode coverage floor, else skipped (visibly)
    episodes:
      gfc_2008:       {start: "2007-10-01", end: "2009-06-30"}
      euro_debt_2011: {start: "2011-05-01", end: "2011-12-31"}
      china_2015:     {start: "2015-06-01", end: "2016-03-31"}
      q4_2018:        {start: "2018-09-01", end: "2018-12-31"}
      covid_2020:     {start: "2020-02-01", end: "2020-08-31"}
      inflation_2022: {start: "2022-01-01", end: "2022-12-31"}
  llm_review_enabled: false
  llm_review_top_n: 5
  llm_review_apply: false
  llm_review_model: claude-sonnet-4-6
  max_trades_per_week: 10
  cooldown_days_after_sell: 3
  cooldown_days_after_stopout: 7
  vol_slippage_scaling: true
  vol_slippage_multiplier: 2.0
  # Barroso–Santa-Clara volatility-scaling overlay (FROZEN: enabled=false).
  # Scales the active STOCK book's exposure by clip(target_vol/realized_vol_{t-1}, 0, w_max),
  # parking the de-risked fraction in cash; applied at rebalance cadence with a deadband.
  # Realized vol = trailing annualized stdev of the held book's flow-free mark-to-market
  # return (scope-independent, computed before trades so no flow contamination).
  #
  # VALIDATION (2026-05-31): works ONLY in active_sleeve_compounding scope — there it beats
  # matched-avg-static exposure in 36/45 windows (sign p<1e-4) and cuts active-sleeve DD in
  # 9/10 windows (-13.1% -> -11.6%). But in OVERALL_STRATEGY scope (live-equivalent, index/ETF
  # sleeve present) it FAILS: ON vs OFF over 45 windows = +0.32pp DD (noise) but -2.3pp excess
  # and excess_better only 11/45. Root cause: it only scales the ~15% active stock book, so the
  # DD benefit dilutes to nothing while the active book still pays the full timing cost.
  # DECISION: NOT wired into live buy_cycle(); keep frozen. Backtest/research feature only.
  # Useful for active-sleeve drawdown study. Do not enable for live trading.
  sleeve_vol_overlay:
    enabled: false
    target_vol: 0.15
    lookback: 63
    w_max: 1.0
    deadband: 0.08
    min_history: 63
    switch_bps: 20.0
tuning:
  # frozen_parameters intentionally empty: presets define the tunable surface
  # per-run, and OOS validation gates catch overfitting. A no-preset tune now
  # optimizes the full base param space (slots 0-15); archetype/regime/cs/sizing
  # tail slots remain frozen-by-default until their preset unfreezes them.
  frozen_parameters: []
reliability:
  enabled: false
  min_reliability_score: 0.7
stability:
  enabled: true
  windows:
  - 30
  - 60
  - 90
  - 180
  - 365
  objectives:
  - sharpe
  - calmar
  output_dir: reports/stability
  unstable_spread_threshold: 0.15
  unstable_cv_threshold: 0.3
  max_unstable_params: 5
  scan_maxiter: 15
  scan_popsize: 6
candidate_rotation:
  buy_cooldown_days: 21
  score_jitter_pct: 0.05
  allow_add_to_existing_if_score_above: 0.82
  cooldown_exempt_if_active_underweight: true
snapshots:
  enabled: true
  subdir: snapshots
  retention_days: 365
  compression: snappy
dividends:
  enabled: true
  track_income: true
  wash_sale_warning: true
  # 2026-06: false -> true. The 2026-06-10 run warned on CVE (loss sale 15 days
  # earlier) then bought anyway, disallowing the loss for taxes. Warning-only
  # provided no protection in automated mode.
  block_rebuy_on_wash_sale_risk: true
research:
  min_snapshots_for_weight_recommendations: 20
  min_snapshots_for_high_confidence: 60
earnings:
  enabled: true
  max_quality_bonus: 0.1
  positive_surprise_bonus: 0.03
  negative_surprise_penalty: 0.05
portfolio_intelligence:
  enabled: true
  watch_score_drop_pct: 0.25
  watch_rank_drop_pct: 0.3
  exit_score_below: 0.45
  exit_rank_below_pct: 0.4
  min_holding_days_before_watch: 5
  premature_exit_min_thesis_score: 0.65
  premature_exit_min_quality: 0.3
  premature_exit_min_momentum: 0.0
  confidence_collapse_reliability_threshold: 0.6
exit_decision:
  enabled: true
  score_below_threshold_requires_confirmation: true
  positive_pnl_exit_downgrade: true
  positive_momentum_exit_downgrade: true
  strong_quality_exit_downgrade: true
  # 2026-06: 0.2 -> -0.35. When sell_weak_value_below moved to -0.18, hard_exit was left
  # at 0.2, inverting the exit ladder (hard_exit must sit BELOW sell_weak — config
  # validation warned on every load and the forced-collapse zone was empty; the
  # score-collapse leg of the DAE confirmed-breakdown check had become vacuous).
  # -0.35 restores the original ~0.17 gap below the thesis-exit threshold.
  hard_exit_score_below: -0.35
  review_score_below: 0.45
  positive_pnl_review_floor: 0.0
  positive_momentum_review_floor: 0.1
  strong_quality_review_floor: 0.7
  trim_profit_threshold: 0.2
  # harvest at +50% (2026-05): full-universe temporal-holdout sweep showed
  # harvest +50% outperforms +30% baseline on holdout: pct-beating 50% vs 56%
  # (slight drop) but excess +2.2% vs +1.1% and Sharpe 1.28 vs 1.24.
  # Threshold raised to avoid cutting winners too early; still below take_profit.
  harvest_profit_threshold: 0.5
  thesis_intact_review_floor: 0.6
  thesis_intact_hard_exit_below: 0.35
  # trim DISABLED (2026-05): full-universe temporal-holdout validation showed
  # trimming winners at +trim_min_gain is a structural alpha-killer — it sells
  # the runaway compounders (NVDA-type) that drive SPY's return. Disabling trim
  # lifted holdout pct-beating-SPY 33%->56%, excess -1.0%->+1.1%, Sharpe
  # 1.15->1.24 (drawdown only -22.3%->-23.9%). Let winners run. See
  # .session_tmp/let_winners_run.py + Obsidian log.
  trim_enabled: false
  trim_fraction: 0.33
  trim_min_gain_pct: 0.08
  trim_score_below: 0.74
  # Momentum veto on trimming: skip trim for winners still trending up. Frozen OFF
  # (false preserves current behavior — the key was previously inert). Validated
  # marginal (raises rolling-window hit-rate vs SPY but Wilcoxon-neutral); not live.
  trim_requires_positive_momentum: false
  trim_to_etfs_pct: 0.85
  # Opportunity-cost exit: cull positions that make NO progress for too long, to
  # recycle active-sleeve capacity. NOT an absolute max-hold — the stall clock
  # RESETS whenever the position makes progress (a fresh high within reclaim_band
  # OR momentum >= floor), so a true winner still running is never culled. This
  # complements "let winners run" (trim_enabled: false) by culling only dead money.
  # Frozen OFF by default (enabled: false = behavior-preserving).
  opportunity_cost:
    enabled: false
    stall_max_days: 120              # days with NO progress before culling
    reclaim_band: 0.03               # within 3% of peak counts as a fresh high
    progress_momentum_floor: 0.1     # momentum_score >= this counts as progress
    require_stronger_candidate: false  # reserved for v2 — must stay false in v1
decision_adjustment:
  premature_exit_threshold: 0.45
  review_confidence_threshold: 0.5
  escalate_watch_to_review: false
outcome_tracking:
  enabled: true
  fill_returns_on_run: true
candidate_selection:
  mode: percentile
  # 2026-06: top_percentile 0.07->0.19, max_candidates 10->12 (breadth). Pairs with quality-momentum
  # score_weights + max_buys_per_rebalance=8 — regime-robust only as a package (see score_weights note).
  top_percentile: 0.19
  max_candidates: 12
  min_candidates: 4
  use_absolute_score_floor: false
  absolute_score_floor: 0.45
  min_quality_score: 0.38
  min_momentum_score: 0.0
  min_conditional_momentum_score: 0.0
  allow_income_defensive_exception: false
  # Live entry gate, decoupled from metric_threshold (which anchors the EXIT ladder
  # at 1.15 and is unreachable as an entry gate — every run previously logged
  # "pre-filter 6947 -> 0" then fell back here anyway). null = use metric_threshold.
  entry_threshold_override: 0.75
  fallback_thresholds:
  - 0.75
  - 0.72
  - 0.7
  min_post_cooldown_candidates: 5
ui:
  allow_config_writes: true
